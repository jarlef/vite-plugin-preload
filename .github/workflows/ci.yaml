name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: 'yarn' # This enables caching for Yarn
     
      - name: Install
        run: yarn install --immutable

      - name: Lint
        run: yarn lint

      - name: Test
        run: yarn test run
